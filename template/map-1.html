<!DOCTYPE html>
<html>

<head>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    html,
    body,
    div {
      width: 100%;
    }
  </style>
</head>

<body>

  <svg id="map" width="2000" height="2000" style="background-color:aqua" xmlns="http://www.w3.org/2000/svg">

    <!-- <polygon points="220,100 300,210 170,250 123,234 0,0" style="fill:#cccccc;
      stroke:#000000;stroke-width:1" /> -->

  </svg>




  <input id="input" />


  <script>
    const map = document.getElementById("map");
    const input = document.getElementById("input")
    //console.log(map)
    map.addEventListener("click", (e) => {
      input.value = `x:${e.offsetX} y:${e.offsetY}`
      console.log(e.offsetX, e.offsetY)
    })

    function draw(parent, node, style) {
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', node);
      polygon.setAttribute('style', style);
      parent.appendChild(polygon);

    }

    draw(map, "391, 599 745, 539 872, 379 896, 254 745, 150 999, 63 499, 0 217, 51  66, 181 0, 470", "fill:#cccccc;stroke:#000000; stroke - width: 1")

    fetch("http://127.0.0.1:8899/pool_cnts", {
      method: "POST",
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        'id': 'aaa'
      })
    })


  </script>
</body>

</html>
